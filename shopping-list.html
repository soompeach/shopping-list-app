<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .stats span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: background 0.15s, opacity 0.15s;
    }

    li.checked {
      background: #ebf8ee;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off" />
      <button onclick="addItem()">추가</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul id="list"></ul>

    <div id="emptyMsg" class="empty">아직 아이템이 없습니다.<br>위에서 추가해 보세요!</div>

    <button class="clear-btn" onclick="clearChecked()">완료된 항목 모두 삭제</button>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list_items';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const stats = document.getElementById('stats');

      list.innerHTML = '';

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
        stats.textContent = '';
      } else {
        emptyMsg.style.display = 'none';
        const done = items.filter(i => i.checked).length;
        stats.innerHTML = `총 <span>${items.length}</span>개 &nbsp;·&nbsp; 완료 <span>${done}</span>개`;

        items.forEach((item, idx) => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.checked;
          cb.addEventListener('change', () => toggleItem(idx));

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '✕';
          del.title = '삭제';
          del.addEventListener('click', () => deleteItem(idx));

          li.appendChild(cb);
          li.appendChild(span);
          li.appendChild(del);
          list.appendChild(li);
        });
      }
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
